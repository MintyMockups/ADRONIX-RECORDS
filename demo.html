<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Submission | ADRONIX RECORDS</title>
    <!-- Link to your main styling sheet -->
    <link rel="stylesheet" href="style.css">
    <style>
        /* Fallback dark theme styling in case your style.css does not cover these elements */
        :root {
            --bg-color: #0d0d12;
            --card-bg: #161622;
            --accent-color: #5865F2; /* Discord Blurple */
            --text-color: #ffffff;
            --text-muted: #a0a0b0;
            --border-color: #2a2a3a;
            --success-color: #2ecc71;
            --error-color: #e74c3c;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 650px;
            margin: 60px auto;
            padding: 20px;
        }

        .submission-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .label-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .label-header h1 {
            font-size: 2.2rem;
            letter-spacing: 2px;
            margin: 0 0 10px 0;
            text-transform: uppercase;
        }

        .label-header p {
            color: var(--text-muted);
            margin: 0;
        }

        .form-group {
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            background-color: #09090d;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-color);
            padding: 12px 16px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(88, 101, 242, 0.25);
        }

        .form-help {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 6px;
            line-height: 1.4;
        }

        .form-help a {
            color: var(--accent-color);
            text-decoration: none;
        }

        .form-help a:hover {
            text-decoration: underline;
        }

        button[type="submit"] {
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 14px 20px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s, transform 0.1s;
        }

        button[type="submit"]:hover {
            background-color: #4752C4;
        }

        button[type="submit"]:active {
            transform: scale(0.98);
        }

        button[type="submit"]:disabled {
            background-color: #3c4270;
            cursor: not-allowed;
        }

        .form-status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 6px;
            font-size: 0.95rem;
            display: none;
            text-align: center;
        }

        .form-status.success {
            display: block;
            background-color: rgba(46, 204, 113, 0.15);
            border: 1px solid var(--success-color);
            color: var(--success-color);
        }

        .form-status.error {
            display: block;
            background-color: rgba(231, 76, 60, 0.15);
            border: 1px solid var(--error-color);
            color: var(--error-color);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="submission-card">
            <div class="label-header">
                <h1>ADRONIX RECORDS</h1>
                <p>Demo Submission Portal</p>
            </div>

            <form id="demo-submission-form">
                
                <div class="form-group">
                    <label for="artist-name">Artist / Project Name</label>
                    <input type="text" id="artist-name" name="artistName" placeholder="Your music handle" required>
                </div>

                <div class="form-group">
                    <label for="email">Contact Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="discord-id">Discord User ID</label>
                    <input type="text" id="discord-id" name="discordId" placeholder="e.g., 281920389102910291" required>
                    <span class="form-help">
                        Enter your 17–19 digit numerical Discord ID. 
                        <a href="https://support.discord.com/hc/en-us/articles/206346498-Where-can-I-find-my-User-Server-Message-ID-" target="_blank" rel="noopener">Find my Discord ID</a>.
                    </span>
                </div>

                <div class="form-group">
                    <label for="demo-link">Demo Link</label>
                    <input type="url" id="demo-link" name="demoLink" placeholder="SoundCloud link, Dropbox, Google Drive" required>
                    <span class="form-help">Make sure sharing permissions are set to "Public" or "Anyone with the link can view/listen".</span>
                </div>

                <div class="form-group">
                    <label for="genre">Primary Genre</label>
                    <input type="text" id="genre" name="genre" placeholder="e.g., Techno, Hardstyle, DnB" required>
                </div>

                <div class="form-group">
                    <label for="message">Introduce Yourself</label>
                    <textarea id="message" name="message" rows="5" placeholder="Tell us about yourself, your goals, and your track..."></textarea>
                </div>

                <button type="submit" id="submit-btn">Send Demo</button>
                <div id="form-status" class="form-status"></div>
            </form>
        </div>
    </div>

    <!-- Main JS file -->
    <script src="script.js"></script>
</body>
</html>
