<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Submission | ADRONIX RECORDS</title>
    <style>
        :root {
            --bg-color: #0d0d12;
            --card-bg: #161622;
            --accent-color: #5865F2; /* Discord Blurple */
            --text-color: #ffffff;
            --text-muted: #a0a0b0;
            --border-color: #2a2a3a;
            --success-color: #2ecc71;
            --error-color: #e74c3c;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 650px;
            margin: 60px auto;
            padding: 20px;
        }

        .submission-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .label-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .label-header h1 {
            font-size: 2.2rem;
            letter-spacing: 2px;
            margin: 0 0 10px 0;
            text-transform: uppercase;
        }

        .label-header p {
            color: var(--text-muted);
            margin: 0;
        }

        .form-group {
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            background-color: #09090d;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-color);
            padding: 12px 16px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(88, 101, 242, 0.25);
        }

        .form-help {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 6px;
            line-height: 1.4;
        }

        .form-help a {
            color: var(--accent-color);
            text-decoration: none;
        }

        button[type="submit"] {
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 14px 20px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
        }

        button[type="submit"]:hover {
            background-color: #4752C4;
        }

        button[type="submit"]:disabled {
            background-color: #3c4270;
            cursor: not-allowed;
        }

        .form-status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 6px;
            font-size: 0.95rem;
            display: none;
            text-align: center;
        }

        .form-status.success {
            display: block;
            background-color: rgba(46, 204, 113, 0.15);
            border: 1px solid var(--success-color);
            color: var(--success-color);
        }

        .form-status.error {
            display: block;
            background-color: rgba(231, 76, 60, 0.15);
            border: 1px solid var(--error-color);
            color: var(--error-color);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="submission-card">
            <div class="label-header">
                <h1>ADRONIX RECORDS</h1>
                <p>Demo Submission Portal</p>
            </div>

            <form id="demo-submission-form">
                
                <div class="form-group">
                    <label for="artist-name">Artist / Project Name</label>
                    <input type="text" id="artist-name" placeholder="Your music handle" required>
                </div>

                <div class="form-group">
                    <label for="email">Contact Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="discord-id">Discord User ID</label>
                    <input type="text" id="discord-id" placeholder="e.g., 281920389102910291" required>
                    <span class="form-help">Must be your 17–19 digit numerical Discord ID.</span>
                </div>

                <div class="form-group">
                    <label for="demo-link">Demo Link</label>
                    <input type="url" id="demo-link" placeholder="SoundCloud link, Dropbox, Google Drive" required>
                </div>

                <div class="form-group">
                    <label for="genre">Primary Genre</label>
                    <input type="text" id="genre" placeholder="e.g., Techno, Hardstyle, DnB" required>
                </div>

                <div class="form-group">
                    <label for="message">Introduce Yourself</label>
                    <textarea id="message" rows="5" placeholder="Tell us about yourself..."></textarea>
                </div>

                <button type="submit" id="submit-btn">Send Demo</button>
                <div id="form-status" class="form-status"></div>
            </form>
        </div>
    </div>

    <!-- INLINE JAVASCRIPT TO PREVENT ENTIRE CACHING & PATH ISSUES -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('demo-submission-form');
            const statusDiv = document.getElementById('form-status');
            const submitBtn = document.getElementById('submit-btn');

            if (!form) return;

            // Using your exact live Discord Webhook
            const DISCORD_WEBHOOK_URL = 'https://discord.com/api/webhooks/1515301739937665145/hn4TDo_54qfAkzX9UEkO-xkr88mJsNAOdqrIWqSX3YFKl9RDCMCD5V8aSHUf3Iz29iqw';
            
            // Your Cloudflare Worker URL
            const BACKEND_API_URL = 'https://adronix-records-bot.shivanshkashyap448.workers.dev/api/create-channel';

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const artistName = document.getElementById('artist-name').value.trim();
                const email = document.getElementById('email').value.trim();
                const discordId = document.getElementById('discord-id').value.trim();
                const demoLink = document.getElementById('demo-link').value.trim();
                const genre = document.getElementById('genre').value.trim();
                const message = document.getElementById('message').value.trim();

                const isNumericId = /^\d{17,19}$/.test(discordId);
                if (!isNumericId) {
                    statusDiv.textContent = 'Invalid Discord ID format. Must be a 17-19 digit number.';
                    statusDiv.style.display = 'block';
                    statusDiv.className = 'form-status error';
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.textContent = 'Sending...';
                statusDiv.style.display = 'none';

                const channelCreationUrl = `${BACKEND_API_URL}?userId=${encodeURIComponent(discordId)}&artist=${encodeURIComponent(artistName)}&genre=${encodeURIComponent(genre)}`;

                const payload = {
                    embeds: [
                        {
                            title: "🎵 New ADRONIX Demo Submission",
                            color: 5793266,
                            fields: [
                                { name: "👤 Artist/Project", value: artistName, inline: true },
                                { name: "📧 Email", value: email, inline: true },
                                { name: "🆔 Discord User", value: `<@${discordId}> (${discordId})`, inline: true },
                                { name: "🎹 Genre", value: genre, inline: true },
                                { name: "🔗 Submission Link", value: `[Listen here](${demoLink})`, inline: false },
                                { name: "💬 Biography / Cover Note", value: message || "No biography provided.", inline: false },
                                { name: "🛠️ Administrative Actions", value: `👉 [**Create Private Channel**](${channelCreationUrl})`, inline: false }
                            ],
                            timestamp: new Date().toISOString()
                        }
                    ]
                };

                try {
                    const response = await fetch(DISCORD_WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (response.ok) {
                        form.reset();
                        statusDiv.textContent = 'Success! Your demo has been sent.';
                        statusDiv.style.display = 'block';
                        statusDiv.className = 'form-status success';
                    } else {
                        const err = await response.text();
                        throw new Error(err);
                    }
                } catch (error) {
                    console.error(error);
                    statusDiv.textContent = 'Submission failed. Please check the F12 console for details.';
                    statusDiv.style.display = 'block';
                    statusDiv.className = 'form-status error';
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Send Demo';
                }
            });
        });
    </script>
</body>
</html>
