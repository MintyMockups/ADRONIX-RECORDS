<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Artists | ADRONIX RECORDS</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Exo+2:ital,wght@0,100;0,300;0,400;0,600;1,300&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<canvas id="nebula-bg"></canvas>

<nav id="navbar">
  <a href="index.html" class="nav-logo-container">
    <img id="dynamic-logo" class="nav-logo-img" src="" alt="Adronix Logo" />
    <span id="dynamic-logo-text" class="nav-logo-text">ADRONIX</span>
  </a>
  <div class="nav-links" id="navLinks">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="artists.html">Artists</a>
    <a href="catalogue.html">Catalogue</a>
    <a href="contact.html">Contact</a>
    <a href="demo.html" class="nav-submit-btn">Submit Demo</a>
  </div>
  <div class="hamburger" onclick="toggleNav()" id="hamburger">
    <span></span><span></span><span></span>
  </div>
</nav>

<div class="page">
  <section class="section">
    <div class="section-header">
      <span class="section-label">The Constellation</span>
      <h2 class="section-title">Our Artists</h2>
      <div class="section-divider"></div>
    </div>
    <div class="artists-grid" id="dynamic-artists">
      <!-- Dynamically generated from artists.json -->
    </div>
  </section>
</div>

<footer>
  <div class="footer-grid">
    <div>
      <h3 style="font-family:'Orbitron'; color:var(--text-primary); margin-bottom:10px;">ADRONIX RECORDS</h3>
      <p style="color:var(--text-muted); font-size:0.9rem;">Born from the underground. Built for the limitless.</p>
    </div>
    <div class="footer-col">
      <h4>Navigation</h4>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="artists.html">Artists</a>
      <a href="catalogue.html">Catalogue</a>
    </div>
    <div class="footer-col">
      <h4>Legal</h4>
      <a href="privacy.html">Privacy Policy</a>
      <a href="terms.html">Terms of Use</a>
      <a href="fraud.html">Fraud Warning</a>
    </div>
  </div>
  <div class="footer-bottom">
    <p>© 2026 ADRONIX RECORDS. All Rights Reserved.</p>
  </div>
</footer>

<div class="notification" id="notification"></div>
<script src="script.js"></script>
<script>
  // Dynamic fetch execution for artists
  document.addEventListener("DOMContentLoaded", () => {
    fetch('artists.json')
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById('dynamic-artists');
        if (!data || data.length === 0) {
          container.innerHTML = `<div class="empty-state"><h3>No artists now, see you in future! 🚀</h3></div>`;
          return;
        }
        container.innerHTML = data.map(artist => `
          <div class="artist-card">
            <div class="artist-img" style="background-image: url('${artist.image}'); background-color: var(--nebula-purple);"></div>
            <div class="artist-info">
              <div class="artist-name">${artist.name}</div>
              <span style="color:var(--nebula-cyan); font-size:0.7rem; text-transform:uppercase; letter-spacing:2px;">${artist.genre}</span>
              <p style="color:rgba(240,230,255,0.6); font-size:0.85rem; margin-top:10px;">${artist.bio}</p>
            </div>
          </div>
        `).join('');
      })
      .catch(err => {
        console.error("Error loading artists data:", err);
        document.getElementById('dynamic-artists').innerHTML = `
          <div class="empty-state"><h3>Failed to parse artists array.</h3></div>
        `;
      });
  });
</script>
</body>
</html>
