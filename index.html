<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADRONIX RECORDS</title>
</head>
<body>
    <h1>ADRONIX RECORDS</h1>
    <form action="submit_form" method="POST">
        <label for="artist">Artist Name:</label>
        <input type="text" id="artist" name="artist" required>
        <br>
        <label for="track">Track Title:</label>
        <input type="text" id="track" name="track" required>
        <br>
        <label for="spotify">Spotify URL:</label>
        <input type="url" id="spotify" name="spotify" required>
        <br>
        <label for="biography">Artist Biography:</label>
        <textarea id="biography" name="biography"></textarea>
        <br>
        <input type="submit" value="Submit">
    </form>
</body>
</html>
