<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADRONIX RECORDS Submission Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: url('your-canvas-background-url.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            padding: 20px;
        }
        form {
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 8px;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 4px;
        }
        button {
            background-color: #e74c3c;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>
    <h1>Artist Submission Form</h1>
    <form action="/submit" method="POST">
        <label for="artistName">Artist Name (Required):</label>
        <input type="text" id="artistName" name="artistName" required>

        <label for="email">Email (Required):</label>
        <input type="email" id="email" name="email" required>

        <label for="genre">Genre (Required):</label>
        <input type="text" id="genre" name="genre" required>

        <label for="spotifyUrl">Spotify URL (Required):</label>
        <input type="url" id="spotifyUrl" name="spotifyUrl" required>

        <label for="soundCloudLink">SoundCloud/Drive Link (Required):</label>
        <input type="url" id="soundCloudLink" name="soundCloudLink" required>

        <label for="artistBio">Artist Biography (Optional):</label>
        <textarea id="artistBio" name="artistBio" rows="4"></textarea>

        <button type="submit">Submit</button>
    </form>
</body>
</html>
